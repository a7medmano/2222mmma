<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nerko+One&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/media.css" />
  </head>
  <body>
    <section
      id="sectionReload"
      class="position-absolute top-0 bottom-0 start-0 end-0 z-3 d-flex justify-content-center align-items-center"
    >
      <i class="fa-solid fa-circle-notch fa-spin"></i>
    </section>

    <section id="sectionGames" class="bg-game-dark">
      <header>
        <img src="image/wraper.png" alt="bg-gamer" class="w-100" />
      </header>

      <nav
        class="navbar navbar-expand-lg position-sticky top-0 col-md-6 col-lg-9 mx-auto z-2"
      >
        <div class="container bg-nav rounded-4 py-1">
          <div
            class="navbar-brand text-light d-flex align-items-center"
            href="#"
          >
            <img src="image/logo-sm.png" alt="logo" />
            <h1 class="h5 fs-3 ms-2">GAME REVIEWS</h1>
          </div>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 text-uppercase">
              <li class="nav-item">
                <a
                  id="mmorpg"
                  class="nav-link active text-light"
                  aria-current="page"
                  href="#"
                  >mmorpg</a
                >
              </li>
              <li class="nav-item">
                <a id="shooter" class="nav-link text-light" href="#">shooter</a>
              </li>
              <li class="nav-item">
                <a id="sailing" class="nav-link text-light" href="#">sailing</a>
              </li>
              <li class="nav-item">
                <a id="permadeath" class="nav-link text-light" href="#"
                  >permadeath</a
                >
              </li>
              <li class="nav-item">
                <a id="superhero" class="nav-link text-light" href="#"
                  >superhero</a
                >
              </li>
              <li class="nav-item">
                <a id="pixel" class="nav-link text-light" href="#">pixel</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <main>
        <div class="py-5">
          <div class="container">
            <div id="containerCards" class="row g-4"></div>
          </div>
        </div>
      </main>
    </section>

    <section id="sectionDetails" class="bg-details-dark vh-100 d-none">
      <div class="container">
        <div id="containerDitails"></div>
      </div>
    </section>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
